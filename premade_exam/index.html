function getExamTimeStatus(exam) {
  const now = new Date();
  
  // اگر زمان شروع و پایان تعریف نشده باشد، همیشه فعال است
  if (!exam.startTime || !exam.endTime) {
    return { status: 'active', remainingTime: null };
  }
  
  const startTime = persianToGregorian(exam.startTime);
  const endTime = persianToGregorian(exam.endTime);
  
  if (now < startTime) {
    // هنوز شروع نشده
    const remaining = startTime - now;
    return { 
      status: 'not-started', 
      remainingTime: remaining,
      startTime: startTime,
      endTime: endTime
    };
  } else if (now >= startTime && now <= endTime) {
    // در حال برگزاری
    const remaining = endTime - now;
    return { 
      status: 'active', 
      remainingTime: remaining,
      endTime: endTime
    };
  } else {
    // تمام شده
    return { 
      status: 'ended', 
      remainingTime: null,
      endTime: endTime
    };
  }
}

// فرمت کردن زمان باقی‌مانده
function formatRemainingTime(milliseconds) {
  if (!milliseconds || milliseconds <= 0) return "00:00:00";
  
  const totalSeconds = Math.floor(milliseconds / 1000);
  const hours = Math.floor(totalSeconds / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;
  
  return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
}

// ایجاد تایمر برای آزمون
function createTimer(examId, remainingTime, containerId) {
  // پاک کردن تایمر قبلی اگر وجود دارد
  if (timerIntervals[examId]) {
    clearInterval(timerIntervals[examId]);
  }
  
  const container = document.getElementById(containerId);
  if (!container) return;
  
  let remaining = remainingTime;
  
  // آپدیت اولیه
  container.innerHTML = `
    <div class="text-center p-3 bg-purple-900/30 rounded-lg border border-purple-500/30">
      <div class="text-sm text-purple-300 mb-1">
        <i class="fas fa-clock ml-1"></i>شروع آزمون تا:
      </div>
      <div class="text-xl font-bold text-purple-400 font-mono" id="timer-${examId}">
        ${formatRemainingTime(remaining)}
      </div>
      <div class="text-xs text-gray-400 mt-1">لطفا منتظر بمانید...</div>
    </div>
  `;
  
  // آپدیت هر ثانیه
  timerIntervals[examId] = setInterval(() => {
    remaining -= 1000;
    
    const timerElement = document.getElementById(`timer-${examId}`);
    if (timerElement) {
      timerElement.textContent = formatRemainingTime(remaining);
    }
    
    if (remaining <= 0) {
      clearInterval(timerIntervals[examId]);
      // تایمر تمام شده، صفحه را رفرش کنید تا وضعیت به‌روز شود
      setTimeout(() => {
        applyFiltersAndSort();
        displayExams();
      }, 1000);
    }
  }, 1000);
}
    // بارگذاری آزمون‌ها
    async function loadExams() {
  try {
    let headers = new Headers();
    headers.append('Content-Type', 'application/json');
    headers.append('Accept', 'application/json');
    
    const response = await fetch('https://vida-settings.s3.ir-thr-at1.arvanstorage.ir/Settings%2Fexams.json?versionId=', {
      headers: headers,
      method: 'GET',
      cache: "no-store",
    });
    
    if (!response.ok) {
      throw new Error('فایل exams.json یافت نشد');
    }
    
    const data = await response.json();
    allExams = data.exams;
    
    // به‌روزرسانی آمار
    updateStats();
    
    // اعمال فیلترها و مرتب‌سازی
    applyFiltersAndSort();
    
    // نمایش لیست
    displayExams();
    
    document.getElementById('loadingState').classList.add('hidden');
  } catch (error) {
    console.error('خطا در بارگذاری آزمون‌ها:', error);
    document.getElementById('loadingState').innerHTML = `
      <div class="text-center py-8 text-red-400">
        <i class="fas fa-exclamation-triangle text-4xl mb-4"></i>
        <p>خطا در بارگذاری آزمون‌ها</p>
        <p class="text-sm mt-2">${error.message}</p>
        <button onclick="window.location.reload()" class="mt-4 px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg">
          تلاش مجدد
        </button>
      </div>
    `;
  }
}


    // به‌روزرسانی آمار
    function updateStats() {
      const totalExams = allExams.length;
      const totalQuestions = allExams.reduce((sum, exam) => {
        return sum + Object.values(exam.subjectCounts).reduce((a, b) => a + b, 0);
      }, 0);
      
      // شمارش درس‌های پوشش داده شده
      const subjectsCovered = new Set();
      allExams.forEach(exam => {
        Object.entries(exam.subjectCounts).forEach(([subject, count]) => {
          if (count > 0) {
            subjectsCovered.add(subject.replace('Count', ''));
          }
        });
      });
      
      const totalTime = allExams.reduce((sum, exam) => sum + exam.time, 0);
      
      document.getElementById('totalExams').textContent = totalExams;
      document.getElementById('totalQuestions').textContent = totalQuestions;
      document.getElementById('totalSubjects').textContent = subjectsCovered.size;
      document.getElementById('totalTime').textContent = totalTime;
    }

    // اعمال فیلترها و مرتب‌سازی
    function applyFiltersAndSort() {
      filteredExams = [...allExams];
      
      // اعمال فیلتر موضوع
      if (currentFilters.subject !== 'all') {
        filteredExams = filteredExams.filter(exam => {
          const subjectKey = currentFilters.subject + 'Count';
          return exam.subjectCounts[subjectKey] > 0;
        });
      }
      
      // اعمال فیلتر سطح دشواری
      if (currentFilters.difficulty !== 'all') {
        filteredExams = filteredExams.filter(exam => {
          const difficultyMap = {
            'easy': ['آسان'],
            'medium': ['متوسط'],
            'hard': ['دشوار', 'خیلی دشوار']
          };
          
          if (currentFilters.difficulty === 'all') return true;
          const difficulties = difficultyMap[currentFilters.difficulty];
          return difficulties && difficulties.some(d => exam.difficulty.includes(d));
        });
      }
      
      // اعمال جستجو
      if (currentFilters.search.trim() !== '') {
        const searchTerm = currentFilters.search.toLowerCase();
        filteredExams = filteredExams.filter(exam => 
          exam.name.toLowerCase().includes(searchTerm) ||
          (exam.description && exam.description.toLowerCase().includes(searchTerm)) ||
          (exam.tags && exam.tags.some(tag => tag.toLowerCase().includes(searchTerm)))
        );
      }
      
      // مرتب‌سازی
      switch(currentSort) {
        case 'name':
          filteredExams.sort((a, b) => a.name.localeCompare(b.name, 'fa'));
          break;
        case 'questions':
          filteredExams.sort((a, b) => {
            const aTotal = Object.values(a.subjectCounts).reduce((sum, val) => sum + val, 0);
            const bTotal = Object.values(b.subjectCounts).reduce((sum, val) => sum + val, 0);
            return bTotal - aTotal;
          });
          break;
        case 'time':
          filteredExams.sort((a, b) => b.time - a.time);
          break;
        case 'difficulty':
          const difficultyOrder = { 'خیلی دشوار': 4, 'دشوار': 3, 'متوسط': 2, 'آسان': 1 };
          filteredExams.sort((a, b) => {
            const aOrder = difficultyOrder[a.difficulty] || 2;
            const bOrder = difficultyOrder[b.difficulty] || 2;
            return bOrder - aOrder;
          });
          break;
        case 'date':
        default:
          // فرض می‌کنیم تاریخ به فرمت YYYY/MM/DD است
          filteredExams.sort((a, b) => {
            const aParts = a.date.split('/').map(Number);
            const bParts = b.date.split('/').map(Number);
            
            // مقایسه سال
            if (aParts[0] !== bParts[0]) return bParts[0] - aParts[0];
            // مقایسه ماه
            if (aParts[1] !== bParts[1]) return bParts[1] - aParts[1];
            // مقایسه روز
            return bParts[2] - aParts[2];
          });
          break;
      }
      
      updateActiveFilters();
    }

    // فیلتر بر اساس درس
    function filterBySubject(subject) {
      currentFilters.subject = subject;
      
      // به‌روزرسانی دکمه‌های فعال
      document.querySelectorAll('#filter-all, #filter-bio, #filter-phys, #filter-chem, #filter-math, filter-geo').forEach(btn => {
        btn.classList.remove('active');
      });
      document.getElementById(`filter-${subject}`).classList.add('active');
      
      applyFiltersAndSort();
      displayExams();
    }

    // فیلتر بر اساس سطح دشواری
    function filterByDifficulty(difficulty) {
      currentFilters.difficulty = difficulty;
      
      // به‌روزرسانی دکمه‌های فعال
      document.querySelectorAll('#difficulty-all, #difficulty-easy, #difficulty-medium, #difficulty-hard').forEach(btn => {
        btn.classList.remove('active');
      });
      document.getElementById(`difficulty-${difficulty}`).classList.add('active');
      
      applyFiltersAndSort();
      displayExams();
    }

    // جستجوی آزمون‌ها
    function searchExams() {
      currentFilters.search = document.getElementById('searchInput').value;
      applyFiltersAndSort();
      displayExams();
    }

    // مرتب‌سازی آزمون‌ها
    function sortExams() {
      currentSort = document.getElementById('sortSelect').value;
      applyFiltersAndSort();
      displayExams();
    }

    // به‌روزرسانی فیلترهای فعال
    function updateActiveFilters() {
      const activeFiltersDiv = document.getElementById('activeFilters');
      let filters = [];
      
      if (currentFilters.subject !== 'all') {
        filters.push(`درس: ${getSubjectName(currentFilters.subject + 'Count')}`);
      }
      
      if (currentFilters.difficulty !== 'all') {
        const difficultyNames = {
          'easy': 'آسان',
          'medium': 'متوسط',
          'hard': 'دشوار'
        };
        filters.push(`سطح: ${difficultyNames[currentFilters.difficulty] || currentFilters.difficulty}`);
      }
      
      if (currentFilters.search.trim() !== '') {
        filters.push(`جستجو: "${currentFilters.search}"`);
      }
      
      if (filters.length > 0) {
        activeFiltersDiv.innerHTML = `
          <div class="flex items-center flex-wrap gap-2">
            <span class="text-gray-400 text-sm">فیلترهای فعال:</span>
            ${filters.map(filter => `
              <span class="tag">
                ${filter}
                <button onclick="removeFilter('${filter.split(':')[0].trim()}')" class="mr-1">
                  <i class="fas fa-times text-xs"></i>
                </button>
              </span>
            `).join('')}
            <button onclick="clearAllFilters()" class="text-sm text-purple-400 hover:text-purple-300">
              <i class="fas fa-times-circle ml-1"></i> پاک کردن همه
            </button>
          </div>
        `;
      } else {
        activeFiltersDiv.innerHTML = '';
      }
    }

    // حذف فیلتر
    function removeFilter(filterType) {
      switch(filterType) {
        case 'درس':
          filterBySubject('all');
          break;
        case 'سطح':
          filterByDifficulty('all');
          break;
        case 'جستجو':
          document.getElementById('searchInput').value = '';
          currentFilters.search = '';
          applyFiltersAndSort();
          displayExams();
          break;
      }
    }

    // پاک کردن همه فیلترها
    function clearAllFilters() {
      filterBySubject('all');
      filterByDifficulty('all');
      document.getElementById('searchInput').value = '';
      currentFilters.search = '';
      document.getElementById('sortSelect').value = 'date';
      currentSort = 'date';
      applyFiltersAndSort();
      displayExams();
    }

          <!-- نکات مهم -->
          <div class="bg-blue-500/10 p-6 rounded-lg">
            <h4 class="text-lg font-bold text-white mb-4 flex items-center">
              <i class="fas fa-lightbulb ml-2 text-yellow-400"></i>

            </h4>
            <ul class="space-y-2 text-gray-300">
              <li class="flex items-start">
                <i class="fas fa-check text-green-400 ml-2 mt-1"></i>
                <span>این آزمون به صورت خودکار تنظیمات را پر می‌کند</span>
              </li>
              ${exam.pdfFile ? `
                <li class="flex items-start">
                  <i class="fas fa-check text-green-400 ml-2 mt-1"></i>

              ${exam.answerKey ? `
                <li class="flex items-start">
                  <i class="fas fa-check text-green-400 ml-2 mt-1"></i>
                  <span>کلید پاسخ‌ها به صورت خودکار وارد می‌شود</span>
                </li>
              ` : ''}

                <i class="fas fa-check text-green-400 ml-2 mt-1"></i>
                <span>ذخیره نتیجه آزمون فراموش نشود</span>
              </li>
               <li class="flex items-start">
                <i class="fas fa-check text-green-400 ml-2 mt-1"></i>
                <span>لطفا تا بارگزاری کامل سوالات صبر کنید آزمون دارای 1 دقیقه تایم اضافه است</span>
              </li>

               <li class="flex items-start">
                <i class="fas fa-check text-green-400 ml-2 mt-1"></i>

    // بستن پیش‌نمایش
    function closePreview() {
      document.getElementById('previewModal').classList.add('hidden');
      document.body.style.overflow = 'auto';
    }

    // شروع آزمون
    async function startExam(examId) {
  const exam = allExams.find(e => e.id === examId);
  if (!exam) return;
  
  // بررسی وضعیت زمان
  const timeStatus = getExamTimeStatus(exam);
  
  if (timeStatus.status === 'ended') {
    showNotification('زمان این آزمون به پایان رسیده است', 'error');
    return;
  }
  
  if (timeStatus.status === 'not-started') {
    showNotification('زمان شروع آزمون هنوز نرسیده است', 'warning');
    return;
  }
  
  try {
    showNotification('در حال آماده‌سازی آزمون...', 'info');
    
    // بارگذاری کلید پاسخ
    let answerKey = null;
    try {
      if (exam.answerKey) {
        const response = await fetch(exam.answerKey);
        if (response.ok) {
          answerKey = await response.json();
        }
      }
    } catch (error) {
      console.warn('کلید پاسخ یافت نشد:', error);
    }
    
    // ایجاد داده‌های آزمون برای انتقال
    const examData = {
      id: exam.id,
      name: exam.name,
      subjectCounts: exam.subjectCounts,
      time: exam.time,
      pdfFile: exam.pdfFile,
      answerKey: answerKey,
      difficulty: exam.difficulty,
      tags: exam.tags || [],
      date: exam.date,
      description: exam.description || '',
      startTime: exam.startTime,
      endTime: exam.endTime,
      isPremade: true,
      timestamp: new Date().toISOString()
    };
    
    // ذخیره در localStorage
    localStorage.setItem('selected_premade_exam', JSON.stringify(examData));
    
    // هدایت به صفحه اصلی
    window.location.href = '../public_exam/index.html';
    
  } catch (error) {
    console.error('خطا در شروع آزمون:', error);
    showNotification('خطا در شروع آزمون', 'error');
  }
}

    // شروع آزمون از پیش‌نمایش
    function startExamFromPreview() {
      if (selectedExam) {
        closePreview();
        startExam(selectedExam.id);
      }
    }

    // دانلود PDF
    function downloadPDF(filename) {
      const link = document.createElement('a');
      link.href = filename;
      link.download = filename;
      link.target = '_blank';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // نمایش نوتیفیکیشن
    function showNotification(message, type = 'info') {
  const types = {
    'info': { icon: 'fa-info-circle', color: 'blue-500', bg: 'blue-500/10' },
    'success': { icon: 'fa-check-circle', color: 'green-500', bg: 'green-500/10' },
    'warning': { icon: 'fa-exclamation-triangle', color: 'yellow-500', bg: 'yellow-500/10' },
    'error': { icon: 'fa-times-circle', color: 'red-500', bg: 'red-500/10' }
  };
  
  const config = types[type] || types.info;
  
  const notification = document.createElement('div');
  notification.className = `fixed top-4 right-4 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg border-r-4 border-${config.color} flex items-center z-50 animate-fade-in`;
  notification.innerHTML = `
    <i class="fas ${config.icon} ml-2 text-${config.color}"></i>
    <span>${message}</span>
  `;
  
  document.body.appendChild(notification);
  
  setTimeout(() => {
    notification.style.animation = 'fadeIn 0.3s reverse';
    setTimeout(() => {
      notification.remove();
    }, 300);
  }, 3000);
}


    // توابع کمکی
    function getSubjectName(subjectKey) {
      const subjectMap = {
        'bioCount': 'زیست‌شناسی',
        'physCount': 'فیزیک',
        'chemCount': 'شیمی',
        'mathCount': 'ریاضی',
        'geoCount': 'زمین‌شناسی'
      };
      return subjectMap[subjectKey] || subjectKey;
    }

    function getSubjectClass(subjectKey) {
      const classMap = {
        'bioCount': 'biology',
        'physCount': 'physics',
        'chemCount': 'chemistry',
        'mathCount': 'math',
        'geoCount': 'geology'
      };
      return classMap[subjectKey] || '';
    }

    function getSubjectIcon(subjectKey) {
      const iconMap = {
        'bioCount': 'fa-dna',
        'physCount': 'fa-atom',
        'chemCount': 'fa-flask',
        'mathCount': 'fa-square-root-alt',
        'geoCount': 'fa-mountain'
      };
      return iconMap[subjectKey] || 'fa-question';
    }

    function getSubjectColor(subjectKey) {
      const colorMap = {
        'bioCount': 'text-green-400',
        'physCount': 'text-blue-400',
        'chemCount': 'text-purple-400',
        'mathCount': 'text-yellow-400',
        'geoCount': 'text-red-400'
      };
      return colorMap[subjectKey] || 'text-gray-400';
    }

    function getDifficultyClass(difficulty) {
      if (!difficulty) return 'medium';
      
      const difficultyLower = difficulty.toLowerCase();
      if (difficultyLower.includes('آسان')) return 'easy';
      if (difficultyLower.includes('متوسط')) return 'medium';
      if (difficultyLower.includes('دشوار')) return 'hard';
      if (difficultyLower.includes('خیلی')) return 'very-hard';
      return 'medium';
    }

    // رویدادهای جستجو
    document.getElementById('searchInput').addEventListener('input', searchExams);
    document.getElementById('sortSelect').addEventListener('change', sortExams);

    // بستن مودال با Escape
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && !document.getElementById('previewModal').classList.contains('hidden')) {
        closePreview();
      }
    });



window.addEventListener('beforeunload', () => {
  Object.values(timerIntervals).forEach(interval => clearInterval(interval));
});



    // کلیک خارج از مودال
    document.getElementById('previewModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closePreview();
      }
    });

    // بارگذاری اولیه
    document.addEventListener('DOMContentLoaded', function() {
  loadExams();
  
  // به‌روزرسانی تایمرها هر 30 ثانیه (برای همگام‌سازی)
  setInterval(() => {
    applyFiltersAndSort();
    displayExams();
  }, 300000);
});
  </script>
